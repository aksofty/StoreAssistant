services:
  app:
    build: .
    image: store-assistant:latest
    container_name: store-assistant
    restart: unless-stopped
    env_file: .env
    volumes:
      - './volumes/data:/app/data'
      - './volumes/logs:/app/logs'
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.store-assistant.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.store-assistant.entrypoints=websecure"
      - "traefik.http.routers.store-assistant.tls.certresolver=letsencrypt"
      - "traefik.http.services.store-assistant.loadbalancer.server.port=${PORT}"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.store-assistant-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.store-assistant-http.entrypoints=web"
      - "traefik.http.routers.store-assistant-http.middlewares=store-assistant-https-redirect"
      - "traefik.http.middlewares.store-assistant-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.store-assistant-https-redirect.redirectscheme.permanent=true"

networks:
  traefik-public:
    external: true
